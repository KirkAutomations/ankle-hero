<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ankle Hero — 6 Therapeutic Ankle ROM Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
body{background:#1a1a2e;overflow:hidden;touch-action:none;font-family:'Fredoka','Segoe UI',system-ui,sans-serif;color:#fff;height:100dvh;width:100vw}
canvas{display:block;width:100%;height:100%}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .4s;overflow-y:auto;padding:20px;background:linear-gradient(180deg,#1a1a2e,#16213e)}
.scr.hide{opacity:0;pointer-events:none}
h1{font-size:2rem;margin-bottom:.1em}
.tag{font-size:.85rem;color:#888;margin-bottom:1em}
.games{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px}
.gc{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 10px;text-align:center;cursor:pointer;transition:transform .15s,border-color .2s}
.gc:active{transform:scale(.96)}
.gc:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.1)}
.gc .gi{font-size:2.2rem;margin-bottom:.2em}
.gc .gn{font-size:.95rem;font-weight:600}
.gc .gd{font-size:.65rem;color:#999;margin-top:.15em}
.gc .ga{font-size:.55rem;color:#a29bfe;margin-top:.2em;font-weight:600}
.btn{border:none;color:#fff;font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:600;padding:.8em 2.2em;border-radius:50px;cursor:pointer;margin:.3em}
.btn:active{transform:scale(.95)}
.bp{background:linear-gradient(135deg,#6c5ce7,#a29bfe);box-shadow:0 4px 20px rgba(108,92,231,.4)}
.bs{background:rgba(255,255,255,.1);font-size:.9rem;padding:.6em 1.5em}
.foot-row{display:flex;gap:16px;margin:1em 0}
.fo{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;text-align:center;cursor:pointer;min-width:80px;transition:all .2s}
.fo.act{border-color:#6c5ce7;background:rgba(108,92,231,.15)}
.fo .fi{font-size:1.3rem}
.fo .fl{font-size:.7rem;color:#aaa;margin-top:3px}
.sens{display:flex;align-items:center;gap:8px;margin-bottom:1em}
.sens label{font-size:.8rem;color:#aaa}
.sens input[type=range]{-webkit-appearance:none;width:110px;height:5px;background:rgba(255,255,255,.15);border-radius:3px}
.sens input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:#a29bfe;border-radius:50%;cursor:pointer}
#hud{position:absolute;top:0;left:0;right:0;padding:8px 14px;display:flex;justify-content:space-between;z-index:5;pointer-events:none;font-size:.85rem}
#hud .hl{text-align:left}
#hud .hr{text-align:right}
.hbig{font-size:1.5rem;font-weight:700}
.hsm{font-size:.7rem;color:#aaa}
.result-box{background:rgba(255,255,255,.06);border-radius:12px;padding:12px;text-align:center;min-width:100px}
.result-box .rv{font-size:1.5rem;font-weight:700;color:#a29bfe}
.result-box .rl{font-size:.65rem;color:#888;margin-top:3px}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:280px;margin:1em 0}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="hud" class="hide">
  <div class="hl"><div class="hbig" id="h-score">0</div><div class="hsm" id="h-info"></div></div>
  <div class="hr"><div id="h-stat"></div><div class="hsm" id="h-time">2:00</div></div>
</div>

<!-- MENU -->
<div class="scr" id="menu-scr">
  <h1>🦶 Ankle Hero</h1>
  <p class="tag">6 games. 1 ankle. Pick your challenge.</p>
  <div class="games" id="game-grid"></div>
</div>

<!-- SETUP -->
<div class="scr hide" id="setup-scr">
  <div style="font-size:3.5rem;margin-bottom:.3em" id="s-icon"></div>
  <h2 id="s-name" style="margin-bottom:.2em"></h2>
  <p style="color:#aaa;font-size:.8rem;max-width:280px;text-align:center;margin-bottom:1em" id="s-desc"></p>
  <div class="foot-row">
    <div class="fo act" data-f="top" onclick="setFoot('top')"><div class="fi">🦶</div><div class="fl">Top of Foot</div></div>
    <div class="fo" data-f="shin" onclick="setFoot('shin')"><div class="fi">🦵</div><div class="fl">Shin</div></div>
  </div>
  <div class="sens">
    <label>Sensitivity</label>
    <input type="range" min="1" max="5" value="3" id="sens-sl" oninput="document.getElementById('sens-v').textContent=this.value;SENS=+this.value">
    <span id="sens-v" style="font-size:.8rem;color:#a29bfe">3</span>
  </div>
  <button class="btn bp" onclick="goCalibrate()">Next → Calibrate</button>
  <button class="btn bs" onclick="show('menu-scr')">← Back</button>
</div>

<!-- CALIBRATE -->
<div class="scr hide" id="cal-scr" style="background:rgba(26,26,46,.97)">
  <h2>Calibrate</h2>
  <div style="font-size:4rem;margin:.4em 0;animation:bob 2s ease-in-out infinite">🦶</div>
  <p style="color:#aaa;margin-bottom:.8em" id="cal-msg">Hold foot <strong style="color:#fff">flat on floor</strong> and tap button.</p>
  <div style="font-size:1.6rem;font-weight:700;color:#a29bfe;margin-bottom:.5em;font-variant-numeric:tabular-nums" id="cal-ang">—</div>
  <button class="btn bp" id="cal-btn" onclick="doCalibrate()">Set Neutral</button>
  <button class="btn bs" onclick="show('setup-scr')">← Back</button>
</div>
<style>@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}</style>

<!-- RESULTS -->
<div class="scr hide" id="res-scr" style="background:rgba(26,26,46,.96)">
  <h2 id="res-title">🎉 Great Job!</h2>
  <div class="rg" id="res-grid"></div>
  <button class="btn bp" onclick="startGame()">▶ Play Again</button>
  <button class="btn bs" onclick="show('menu-scr')">Pick Another Game</button>
</div>

<script>
// ═══════════════════════════════════════
//  ANKLE HERO v4 — Six Different Games
// ═══════════════════════════════════════
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
let W,H,dpr;
function resize(){dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(dpr,0,0,dpr,0,0)}
addEventListener('resize',resize);resize();

// ═══ GAME DEFS ═══
const GAMES=[
  {id:'sky',icon:'🐦',name:'Sky Glider',age:'Ages 3-6',genre:'Flight',
   desc:'Fly through clouds, collect stars and fly through rainbow rings! Gentle and fun — no enemies.',
   accent:'#74b9ff',sky:['#87CEEB','#5BA3D9','#2176AE']},
  {id:'dino',icon:'🦖',name:'Dino Dash',age:'Ages 6-9',genre:'Runner',
   desc:'Run through the jungle! Dodge obstacles at different heights — go high or low to survive!',
   accent:'#ff9f43',sky:['#ff7675','#d35400','#1a0a00']},
  {id:'deep',icon:'🤿',name:'Deep Dive',age:'Ages 7-10',genre:'Navigation',
   desc:'Dive through coral caves! Collect fish, avoid jellyfish, and watch your air supply.',
   accent:'#0abde3',sky:['#0984e3','#0a4a6a','#051a2a']},
  {id:'beat',icon:'🎵',name:'Beat Stomper',age:'Ages 8-12',genre:'Rhythm',
   desc:'Hit the notes! Match your ankle to the target height as notes scroll past. Combo for bonus!',
   accent:'#fd79a8',sky:['#2d1b69','#1a0a3e','#0a0515']},
  {id:'pong',icon:'🏓',name:'Astro Pong',age:'Ages 6+',genre:'Versus',
   desc:'Space Pong! Control your paddle with your ankle. Beat the AI — first to 7 wins!',
   accent:'#ffd93d',sky:['#0a0a2e','#050520','#020210']},
  {id:'tight',icon:'🎪',name:'Tightrope',age:'Ages 5-8',genre:'Balance',
   desc:'Stay balanced on the rope! Wind and birds try to knock you off — keep steady!',
   accent:'#6bcb77',sky:['#636e72','#2d3436','#1a1a2e']}
];

// Build menu
const gg=document.getElementById('game-grid');
GAMES.forEach(g=>{const c=document.createElement('div');c.className='gc';c.onclick=()=>pickGame(g.id);
c.innerHTML=`<div class="gi">${g.icon}</div><div class="gn">${g.name}</div><div class="gd">${g.genre}</div><div class="ga">${g.age}</div>`;
gg.appendChild(c)});

// ═══ SHARED STATE ═══
let CUR=null,GD=null; // current game id & def
let FOOT='top',SENS=3,CAL_BETA=0;
let gameOn=false,raf=null,lt=0;
let rawBeta=0,useMouse=false,mouseY=0;
let ankle=0; // -1 to 1 normalized
let gameTime=0,gameDur=120;

function show(id){document.querySelectorAll('.scr').forEach(s=>s.classList.add('hide'));document.getElementById(id).classList.remove('hide')}
function pickGame(id){CUR=id;GD=GAMES.find(g=>g.id===id);
document.getElementById('s-icon').textContent=GD.icon;
document.getElementById('s-name').textContent=GD.name;
document.getElementById('s-desc').textContent=GD.desc;
show('setup-scr')}
function setFoot(f){FOOT=f;document.querySelectorAll('.fo').forEach(el=>el.classList.toggle('act',el.dataset.f===f))}

// ═══ MOTION ═══
let motionOn=false;
function enableMotion(){if(motionOn)return;motionOn=true;addEventListener('deviceorientation',e=>{rawBeta=e.beta||0})}
async function reqMotion(){
if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){try{return(await DeviceOrientationEvent.requestPermission())==='granted'}catch{return false}}
return 'DeviceOrientationEvent' in window}
if(!('ontouchstart' in window)&&!navigator.maxTouchPoints)useMouse=true;
cv.addEventListener('mousemove',e=>{if(useMouse)mouseY=(e.clientY-H/2)/(H/2)});
cv.addEventListener('touchmove',e=>{if(useMouse){e.preventDefault();mouseY=(e.touches[0].clientY-H/2)/(H/2)}},{passive:false});

let calInt=null;
async function goCalibrate(){if(await reqMotion())enableMotion();else useMouse=true;show('cal-scr');
document.getElementById('cal-msg').innerHTML='Hold foot <strong style="color:#fff">flat on floor</strong> and tap button.';
document.getElementById('cal-btn').textContent='Set Neutral';document.getElementById('cal-btn').onclick=doCalibrate;
if(calInt)clearInterval(calInt);calInt=setInterval(()=>{document.getElementById('cal-ang').textContent=(useMouse?0:rawBeta).toFixed(1)+'°'},100)}
function doCalibrate(){CAL_BETA=rawBeta;
document.getElementById('cal-msg').innerHTML='✅ Set at <strong style="color:#fff">'+rawBeta.toFixed(1)+'°</strong>. Ready!';
const b=document.getElementById('cal-btn');b.textContent='▶ START';b.onclick=()=>{if(calInt)clearInterval(calInt);startGame()}}
function calcAnkle(){
if(useMouse)return -mouseY;
let d=rawBeta-CAL_BETA;if(FOOT==='top')d=-d;d*=.5+(SENS-1)*.35;
return Math.max(-1,Math.min(1,d/30))} // normalized -1 to 1

// ═══ START / LOOP / END ═══
function startGame(){show(null);document.getElementById('hud').classList.remove('hide');
gameTime=0;gameOn=true;
if(CUR==='sky')initSky();else if(CUR==='dino')initDino();else if(CUR==='deep')initDeep();
else if(CUR==='beat')initBeat();else if(CUR==='pong')initPong();else if(CUR==='tight')initTight();
lt=performance.now();raf=requestAnimationFrame(loop)}
function loop(ts){const dt=Math.min((ts-lt)/1000,.05);lt=ts;
ankle=calcAnkle();gameTime+=dt;
if(CUR==='sky')updateSky(dt);else if(CUR==='dino')updateDino(dt);else if(CUR==='deep')updateDeep(dt);
else if(CUR==='beat')updateBeat(dt);else if(CUR==='pong')updatePong(dt);else if(CUR==='tight')updateTight(dt);
drawBg();
if(CUR==='sky')drawSky();else if(CUR==='dino')drawDino();else if(CUR==='deep')drawDeep();
else if(CUR==='beat')drawBeat();else if(CUR==='pong')drawPong();else if(CUR==='tight')drawTight();
if(gameOn)raf=requestAnimationFrame(loop)}
function drawBg(){const g=cx.createLinearGradient(0,0,0,H);
(GD.sky||['#1a1a2e','#16213e']).forEach((c,i,a)=>g.addColorStop(i/(a.length-1),c));
cx.fillStyle=g;cx.fillRect(0,0,W,H)}
function endGame(stats){gameOn=false;if(raf)cancelAnimationFrame(raf);
document.getElementById('hud').classList.add('hide');
const pct=stats.pct||0;
let t='🎉 Great Job!';if(pct>=90)t='🏆 AMAZING!';else if(pct>=70)t='⭐ Awesome!';else if(pct>=50)t='👍 Nice Try!';else if(pct>=30)t='💪 Keep Practicing!';
if(stats.title)t=stats.title;
document.getElementById('res-title').textContent=t;
const rg=document.getElementById('res-grid');rg.innerHTML='';
(stats.items||[]).forEach(s=>{const d=document.createElement('div');d.className='result-box';
d.innerHTML=`<div class="rv">${s.val}</div><div class="rl">${s.label}</div>`;rg.appendChild(d)})}
function hud(score,info,stat,time){
document.getElementById('h-score').textContent=score;
document.getElementById('h-info').textContent=info||'';
document.getElementById('h-stat').textContent=stat||'';
const r=Math.max(0,time);document.getElementById('h-time').textContent=Math.floor(r/60)+':'+String(Math.floor(r%60)).padStart(2,'0')}

// Shared helpers
function randF(a,b){return a+Math.random()*(b-a)}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

// ════════════════════════════════════════
//  GAME 1: SKY GLIDER 🐦
// ════════════════════════════════════════
let sky={};
function initSky(){sky={score:0,stars:[],rings:[],clouds:[],birdY:H/2,birdVY:0,scroll:0,
maxROM:0,collected:0,ringsPassed:0,totalRings:0};
for(let i=0;i<8;i++)sky.clouds.push({x:Math.random()*W*2,y:randF(50,H-100),w:randF(60,140),spd:randF(20,50)});
gameDur=90}
function updateSky(dt){
const s=sky;s.scroll+=150*dt;
// Bird position
const tgt=H*.1+(.5-ankle*.5)*(H*.8);
s.birdY+=(tgt-s.birdY)*5*dt;s.birdY=clamp(s.birdY,30,H-30);
s.maxROM=Math.max(s.maxROM,Math.abs(ankle)*30);
// Spawn stars
if(Math.random()<dt*3){s.stars.push({x:W+20,y:randF(40,H-40),r:randF(12,20),got:false})}
// Spawn rings
if(Math.random()<dt*.6){s.rings.push({x:W+40,y:randF(80,H-80),r:50,passed:false});s.totalRings++}
// Move
s.stars.forEach(st=>{st.x-=150*dt});
s.rings.forEach(r=>{r.x-=150*dt});
s.clouds.forEach(c=>{c.x-=c.spd*dt;if(c.x<-200){c.x=W+100;c.y=randF(50,H-100)}});
// Collect stars
s.stars.forEach(st=>{if(!st.got&&Math.abs(st.x-60)<25&&Math.abs(st.y-s.birdY)<25){st.got=true;s.score+=10;s.collected++}});
// Rings
s.rings.forEach(r=>{if(!r.passed&&Math.abs(r.x-60)<20&&Math.abs(r.y-s.birdY)<r.r){r.passed=true;s.score+=50;s.ringsPassed++}});
// Cleanup
s.stars=s.stars.filter(st=>st.x>-30);s.rings=s.rings.filter(r=>r.x>-60);
hud(s.score,'⭐'+s.collected+' 🌈'+s.ringsPassed,'',gameDur-gameTime);
if(gameTime>=gameDur)endGame({pct:s.totalRings?Math.round(s.ringsPassed/s.totalRings*100):100,
items:[{val:s.score,label:'Score'},{val:s.collected,label:'Stars'},{val:s.ringsPassed+'/'+s.totalRings,label:'Rings'},{val:s.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}
function drawSky(){
const s=sky;
// Clouds
s.clouds.forEach(c=>{cx.fillStyle='rgba(255,255,255,.2)';cx.beginPath();cx.ellipse(c.x,c.y,c.w/2,25,0,0,Math.PI*2);cx.fill();
cx.beginPath();cx.ellipse(c.x-c.w*.2,c.y-12,c.w*.3,18,0,0,Math.PI*2);cx.fill();
cx.beginPath();cx.ellipse(c.x+c.w*.25,c.y-8,c.w*.25,15,0,0,Math.PI*2);cx.fill()});
// Rings
s.rings.forEach(r=>{if(r.passed)return;cx.strokeStyle='#ffd93d';cx.lineWidth=5;cx.shadowColor='#ffd93d';cx.shadowBlur=15;
cx.beginPath();cx.ellipse(r.x,r.y,18,r.r,0,0,Math.PI*2);cx.stroke();cx.shadowBlur=0});
// Stars
s.stars.forEach(st=>{if(st.got)return;cx.font=st.r+'px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⭐',st.x,st.y)});
// Bird
const by=s.birdY,bx=60;
cx.save();cx.translate(bx,by);
const tilt=clamp((s.birdY-(H/2))/H*-.3,-.4,.4);cx.rotate(tilt);
cx.font='36px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🐦',0,0);
cx.restore();
// Wing trail
cx.strokeStyle='rgba(116,185,255,.3)';cx.lineWidth=2;
cx.beginPath();for(let i=0;i<20;i++){cx.lineTo(bx-10-i*4,by+Math.sin(gameTime*8+i*.5)*8)}cx.stroke()}

// ════════════════════════════════════════
//  GAME 2: DINO DASH 🦖
// ════════════════════════════════════════
let dino={};
function initDino(){dino={score:0,dinoY:H/2,hp:3,maxHP:3,obs:[],coins:[],scroll:0,speed:200,
maxROM:0,coinsGot:0,dodged:0};gameDur=120}
function updateDino(dt){
const d=dino;d.scroll+=d.speed*dt;d.speed=200+gameTime*2;
const tgt=H*.1+(.5-ankle*.5)*(H*.8);d.dinoY+=(tgt-d.dinoY)*6*dt;d.dinoY=clamp(d.dinoY,40,H-40);
d.maxROM=Math.max(d.maxROM,Math.abs(ankle)*30);
// Spawn obstacles
if(Math.random()<dt*(1+level()*.3)){const lane=Math.random();
let y,e;if(lane<.33){y=H*.8;e='🌵'}else if(lane<.66){y=H*.45;e='🦅'}else{y=H*.15;e='☄️'}
d.obs.push({x:W+30,y,e,w:35,hit:false})}
// Spawn coins
if(Math.random()<dt*2.5){d.coins.push({x:W+30,y:randF(60,H-60),got:false})}
// Move
d.obs.forEach(o=>{o.x-=d.speed*dt});d.coins.forEach(c=>{c.x-=d.speed*dt});
// Collisions
d.obs.forEach(o=>{if(!o.hit&&Math.abs(o.x-70)<30&&Math.abs(o.y-d.dinoY)<35){o.hit=true;d.hp--;d.score=Math.max(0,d.score-20)}});
d.obs.forEach(o=>{if(!o.hit&&o.x<50){o.hit=true;d.dodged++}});
d.coins.forEach(c=>{if(!c.got&&Math.abs(c.x-70)<25&&Math.abs(c.y-d.dinoY)<25){c.got=true;d.score+=15;d.coinsGot++}});
d.obs=d.obs.filter(o=>o.x>-50);d.coins=d.coins.filter(c=>c.x>-30);
let hearts='';for(let i=0;i<d.maxHP;i++)hearts+=i<d.hp?'❤️':'🖤';
hud(d.score,hearts,'🪙'+d.coinsGot,gameDur-gameTime);
if(d.hp<=0||gameTime>=gameDur){const tot=d.dodged+(d.obs.filter(o=>o.hit).length);
endGame({pct:tot?Math.round(d.dodged/Math.max(1,tot)*100):100,title:d.hp<=0?'💀 Game Over!':undefined,
items:[{val:d.score,label:'Score'},{val:d.coinsGot,label:'Coins'},{val:d.dodged,label:'Dodged'},{val:d.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}}
function level(){return Math.floor(gameTime/25)+1}
function drawDino(){
const d=dino;
// Ground with scrolling pattern
cx.fillStyle='rgba(139,90,43,.3)';cx.fillRect(0,H*.88,W,H*.12);
for(let i=0;i<W+40;i+=40){const gx=(i-d.scroll%40);cx.fillStyle='rgba(100,60,20,.2)';cx.fillRect(gx,H*.88,2,H*.12)}
// Obstacles
d.obs.forEach(o=>{if(o.hit&&o.x<50)return;cx.font='34px serif';cx.textAlign='center';cx.textBaseline='middle';
if(!o.hit){cx.shadowColor='#ff4444';cx.shadowBlur=10}cx.fillText(o.e,o.x,o.y);cx.shadowBlur=0});
// Coins
d.coins.forEach(c=>{if(c.got)return;cx.font='22px serif';cx.textAlign='center';cx.textBaseline='middle';
const bob=Math.sin(gameTime*4+c.x*.01)*5;cx.fillText('🪙',c.x,c.y+bob)});
// Dino
cx.save();cx.translate(70,d.dinoY);
const run=Math.sin(gameTime*12)*5;cx.translate(0,run);
cx.font='40px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🦖',0,0);cx.restore();
// Speed lines
cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1;
for(let i=0;i<6;i++){const ly=d.dinoY-30+i*12;const lx=30-Math.random()*20;
cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx-20-d.speed*.05,ly);cx.stroke()}}

// ════════════════════════════════════════
//  GAME 3: DEEP DIVE 🤿
// ════════════════════════════════════════
let deep={};
function initDeep(){deep={score:0,dy:H/2,scroll:0,walls:[],fish:[],hazards:[],air:100,maxAir:100,
maxROM:0,fishGot:0,wallsPassed:0};gameDur=120;
// Init walls
for(let i=0;i<6;i++)deep.walls.push(makeWall(W+200+i*250))}
function makeWall(x){const gapY=randF(H*.2,H*.8),gapH=randF(100,180-level2()*8);
return{x,gapY,gapH,passed:false}}
function level2(){return Math.floor(gameTime/20)+1}
function updateDeep(dt){
const d=deep;d.scroll+=120*dt;
const tgt=H*.05+(.5-ankle*.5)*(H*.9);d.dy+=(tgt-d.dy)*5*dt;d.dy=clamp(d.dy,20,H-20);
d.maxROM=Math.max(d.maxROM,Math.abs(ankle)*30);
// Air: depletes, near surface restores
d.air-=8*dt;if(d.dy<H*.15)d.air+=20*dt;d.air=clamp(d.air,0,d.maxAir);
// Move walls
d.walls.forEach(w=>{w.x-=120*dt;if(!w.passed&&w.x<60){w.passed=true;d.wallsPassed++;d.score+=20}});
d.walls=d.walls.filter(w=>w.x>-40);
while(d.walls.length<6){const last=d.walls[d.walls.length-1];d.walls.push(makeWall(last.x+250))}
// Check wall collision
d.walls.forEach(w=>{if(Math.abs(w.x-60)<15){if(d.dy<w.gapY-w.gapH/2||d.dy>w.gapY+w.gapH/2){d.air-=40*dt;d.score=Math.max(0,d.score-5)}}});
// Fish
if(Math.random()<dt*2){d.fish.push({x:W+20,y:randF(40,H-40),got:false})}
d.fish.forEach(f=>{f.x-=100*dt});
d.fish.forEach(f=>{if(!f.got&&Math.abs(f.x-60)<20&&Math.abs(f.y-d.dy)<25){f.got=true;d.score+=10;d.fishGot++;d.air=Math.min(d.maxAir,d.air+5)}});
d.fish=d.fish.filter(f=>f.x>-30);
// Hazards
if(Math.random()<dt*.8){d.hazards.push({x:W+20,y:randF(60,H-60)})}
d.hazards.forEach(h=>{h.x-=90*dt});
d.hazards.forEach(h=>{if(Math.abs(h.x-60)<20&&Math.abs(h.y-d.dy)<25){d.air-=25;h.x=-100}});
d.hazards=d.hazards.filter(h=>h.x>-30);
const airPct=Math.round(d.air);
hud(d.score,'🫧 '+airPct+'%','🐟'+d.fishGot,gameDur-gameTime);
if(d.air<=0||gameTime>=gameDur)endGame({pct:Math.round(d.wallsPassed/(d.wallsPassed+3)*100),title:d.air<=0?'🫧 Out of Air!':undefined,
items:[{val:d.score,label:'Score'},{val:d.fishGot,label:'Fish'},{val:d.wallsPassed,label:'Caves'},{val:d.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}
function drawDeep(){
const d=deep;
// Underwater particles (bubbles)
cx.fillStyle='rgba(100,200,255,.15)';
for(let i=0;i<15;i++){const bx=(i*97+gameTime*20*(i%3+1))%W,by=H-((gameTime*25*(i%4+1)+i*80)%H);
cx.beginPath();cx.arc(bx,by,2+i%3,0,Math.PI*2);cx.fill()}
// Depth gradient overlay
const depthA=d.dy/H*.4;cx.fillStyle=`rgba(0,0,0,${depthA})`;cx.fillRect(0,0,W,H);
// Surface shimmer
cx.fillStyle='rgba(100,200,255,.1)';cx.fillRect(0,0,W,H*.1);
// Coral walls
d.walls.forEach(w=>{
cx.fillStyle='rgba(255,100,80,.6)';
cx.fillRect(w.x-8,0,16,w.gapY-w.gapH/2);
cx.fillRect(w.x-8,w.gapY+w.gapH/2,16,H-(w.gapY+w.gapH/2));
// Gap glow
cx.fillStyle='rgba(10,189,227,.1)';cx.fillRect(w.x-20,w.gapY-w.gapH/2,40,w.gapH)});
// Fish
d.fish.forEach(f=>{if(f.got)return;cx.font='22px serif';cx.textAlign='center';cx.textBaseline='middle';
cx.fillText('🐠',f.x,f.y+Math.sin(gameTime*3+f.x*.02)*5)});
// Hazards
d.hazards.forEach(h=>{cx.font='26px serif';cx.textAlign='center';cx.textBaseline='middle';
cx.shadowColor='#ff4444';cx.shadowBlur=10;cx.fillText('🪼',h.x,h.y);cx.shadowBlur=0});
// Diver
cx.save();cx.translate(60,d.dy);cx.font='34px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🤿',0,0);
// Bubble trail
cx.fillStyle='rgba(150,220,255,.4)';for(let i=0;i<5;i++){cx.beginPath();cx.arc(-15-i*6,randF(-10,10),2+Math.random()*2,0,Math.PI*2);cx.fill()}
cx.restore();
// Air bar
const barW=W*.6,barH=8,barX=(W-barW)/2,barY=H-25;
cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(barX,barY,barW,barH);
cx.fillStyle=d.air>30?'#0abde3':'#ff4444';cx.fillRect(barX,barY,barW*(d.air/d.maxAir),barH)}

// ════════════════════════════════════════
//  GAME 4: BEAT STOMPER 🎵
// ════════════════════════════════════════
let beat={};
function initBeat(){beat={score:0,notes:[],combo:0,bestCombo:0,hits:0,misses:0,total:0,
markerY:H/2,spawnT:0,maxROM:0,perfects:0,goods:0};gameDur=90}
function updateBeat(dt){
const b=beat;
b.markerY=H*.1+(.5-ankle*.5)*(H*.8);
b.maxROM=Math.max(b.maxROM,Math.abs(ankle)*30);
// Spawn notes in patterns
b.spawnT-=dt;
if(b.spawnT<=0){
const pattern=Math.floor(gameTime/15)%4;
let y;
if(pattern===0)y=H*.2+Math.sin(b.total*.7)*H*.3; // wave
else if(pattern===1)y=H*.15+(b.total%5)*(H*.15); // steps
else if(pattern===2)y=randF(H*.1,H*.9); // random
else y=b.total%2?H*.25:H*.75; // zigzag
b.notes.push({x:W+20,y:clamp(y,H*.08,H*.92),judge:'',fadeT:0,size:28});
b.total++;b.spawnT=.55-Math.min(gameTime*.002,.2)}
// Move notes
const speed=250+gameTime*1.5;
b.notes.forEach(n=>{if(!n.judge)n.x-=speed*dt;if(n.fadeT>0)n.fadeT-=dt});
// Judge at hit line (x=70)
b.notes.forEach(n=>{
if(n.judge)return;
if(n.x<40){n.judge='miss';b.misses++;b.combo=0;n.fadeT=.6}
else if(n.x<90){const dy=Math.abs(n.y-b.markerY);
if(dy<20){n.judge='perfect';b.perfects++;b.hits++;b.combo++;b.score+=100*Math.min(b.combo,8);n.fadeT=.8}
else if(dy<45){n.judge='good';b.goods++;b.hits++;b.combo++;b.score+=50*Math.min(b.combo,8);n.fadeT=.7}}});
if(b.combo>b.bestCombo)b.bestCombo=b.combo;
b.notes=b.notes.filter(n=>n.x>-30&&n.fadeT>0||!n.judge);
hud(b.score,'Combo: '+b.combo+(b.combo>=5?' 🔥':''),b.hits+'/'+(b.hits+b.misses),gameDur-gameTime);
if(gameTime>=gameDur)endGame({pct:b.total?Math.round(b.hits/b.total*100):100,
items:[{val:b.score,label:'Score'},{val:b.perfects,label:'Perfects'},{val:b.bestCombo,label:'Best Combo'},{val:b.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}
function drawBeat(){
const b=beat;
// Hit zone line
cx.strokeStyle='rgba(253,121,168,.4)';cx.lineWidth=2;cx.setLineDash([6,6]);
cx.beginPath();cx.moveTo(70,0);cx.lineTo(70,H);cx.stroke();cx.setLineDash([]);
// Hit zone glow
cx.fillStyle='rgba(253,121,168,.08)';cx.fillRect(50,0,40,H);
// Notes
b.notes.forEach(n=>{
if(n.judge==='perfect'){cx.globalAlpha=n.fadeT/.8;cx.fillStyle='#ffd93d';cx.font='700 16px Fredoka';cx.textAlign='center';cx.fillText('PERFECT!',n.x,n.y-25);cx.globalAlpha=1;return}
if(n.judge==='good'){cx.globalAlpha=n.fadeT/.7;cx.fillStyle='#6bcb77';cx.font='700 14px Fredoka';cx.textAlign='center';cx.fillText('GOOD',n.x,n.y-25);cx.globalAlpha=1;return}
if(n.judge==='miss'){cx.globalAlpha=n.fadeT/.6;cx.fillStyle='#ff4444';cx.font='700 14px Fredoka';cx.textAlign='center';cx.fillText('MISS',n.x,n.y-25);cx.globalAlpha=1;return}
// Unplayed note
const glow=Math.sin(gameTime*6+n.y*.01)*.3+.7;
cx.shadowColor='#fd79a8';cx.shadowBlur=15*glow;
cx.fillStyle='#fd79a8';cx.beginPath();cx.arc(n.x,n.y,14,0,Math.PI*2);cx.fill();
cx.fillStyle='#fff';cx.beginPath();cx.arc(n.x,n.y,8,0,Math.PI*2);cx.fill();
cx.shadowBlur=0;
// Connection line to next
});
// Your marker
cx.shadowColor='#fff';cx.shadowBlur=20;
cx.fillStyle='#fff';cx.beginPath();cx.arc(70,b.markerY,12,0,Math.PI*2);cx.fill();
cx.fillStyle=GD.accent;cx.beginPath();cx.arc(70,b.markerY,8,0,Math.PI*2);cx.fill();
cx.shadowBlur=0;
// Marker trail
cx.strokeStyle='rgba(253,121,168,.2)';cx.lineWidth=3;
cx.beginPath();cx.moveTo(70,b.markerY);cx.lineTo(50,b.markerY);cx.stroke()}

// ════════════════════════════════════════
//  GAME 5: ASTRO PONG 🏓
// ════════════════════════════════════════
let pong={};
function initPong(){pong={py:H/2,ay:H/2,bx:W/2,by:H/2,bvx:250,bvy:randF(-100,100),
pScore:0,aScore:0,padH:80,ballR:10,aiSpd:180,maxROM:0,rallies:0,rally:0,bestRally:0};gameDur=9999}
function updatePong(dt){
const p=pong;
p.py=H*.05+(.5-ankle*.5)*(H*.9);p.py=clamp(p.py,p.padH/2,H-p.padH/2);
p.maxROM=Math.max(p.maxROM,Math.abs(ankle)*30);
// AI
const aiTarget=p.by+(p.bvx<0?p.bvy*.3:0);
p.ay+=(aiTarget-p.ay)*Math.min(1,p.aiSpd*dt/(Math.abs(aiTarget-p.ay)+1)*2);
p.ay=clamp(p.ay,p.padH/2,H-p.padH/2);
// Ball
p.bx+=p.bvx*dt;p.by+=p.bvy*dt;
// Wall bounce
if(p.by<p.ballR){p.by=p.ballR;p.bvy=-p.bvy}
if(p.by>H-p.ballR){p.by=H-p.ballR;p.bvy=-p.bvy}
// Paddle collisions
const pw=12,px=W-30,ax=30;
if(p.bvx>0&&p.bx+p.ballR>px-pw/2&&p.bx-p.ballR<px+pw/2){
if(Math.abs(p.by-p.py)<p.padH/2+p.ballR){p.bvx=-Math.abs(p.bvx)*1.05;
const off=(p.by-p.py)/(p.padH/2);p.bvy=off*300;p.rally++;p.rallies++}}
if(p.bvx<0&&p.bx-p.ballR<ax+pw/2&&p.bx+p.ballR>ax-pw/2){
if(Math.abs(p.by-p.ay)<p.padH/2+p.ballR){p.bvx=Math.abs(p.bvx)*1.05;
const off=(p.by-p.ay)/(p.padH/2);p.bvy=off*300;p.rally++}}
// Score
if(p.bx>W+20){p.aScore++;resetBall(p,-1);if(p.rally>p.bestRally)p.bestRally=p.rally;p.rally=0}
if(p.bx<-20){p.pScore++;resetBall(p,1);if(p.rally>p.bestRally)p.bestRally=p.rally;p.rally=0}
hud(p.pScore+' - '+p.aScore,'Rally: '+p.rally,'First to 7','');
document.getElementById('h-time').textContent=p.pScore>=7?'YOU WIN!':p.aScore>=7?'AI WINS!':'';
if(p.pScore>=7||p.aScore>=7)endGame({pct:p.pScore>=7?100:30,title:p.pScore>=7?'🏆 You Win!':'😤 AI Wins!',
items:[{val:p.pScore+'-'+p.aScore,label:'Final Score'},{val:p.bestRally,label:'Best Rally'},{val:p.rallies,label:'Total Rallies'},{val:p.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}
function resetBall(p,dir){p.bx=W/2;p.by=H/2;p.bvx=250*dir;p.bvy=randF(-120,120)}
function drawPong(){
const p=pong;
// Center line
cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=2;cx.setLineDash([8,8]);
cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();cx.setLineDash([]);
// Paddles
cx.shadowColor=GD.accent;cx.shadowBlur=15;
cx.fillStyle='#fff';cx.fillRect(W-36,p.py-p.padH/2,12,p.padH);
cx.fillStyle='#aaa';cx.fillRect(24,p.ay-p.padH/2,12,p.padH);cx.shadowBlur=0;
// Ball
cx.fillStyle='#ffd93d';cx.shadowColor='#ffd93d';cx.shadowBlur=20;
cx.beginPath();cx.arc(p.bx,p.by,p.ballR,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
// Ball trail
cx.strokeStyle='rgba(255,217,61,.2)';cx.lineWidth=3;
cx.beginPath();cx.moveTo(p.bx,p.by);cx.lineTo(p.bx-p.bvx*.05,p.by-p.bvy*.05);cx.stroke();
// Big score display
cx.font='700 48px Fredoka';cx.textAlign='center';cx.fillStyle='rgba(255,255,255,.1)';
cx.fillText(p.aScore,W*.25,H/2+15);cx.fillText(p.pScore,W*.75,H/2+15)}

// ════════════════════════════════════════
//  GAME 6: TIGHTROPE 🎪
// ════════════════════════════════════════
let tight={};
function initTight(){tight={lean:0,leanVel:0,score:0,time:0,fallen:false,
wind:0,windT:0,gems:[],gemsGot:0,maxLean:0,maxROM:0,wobble:0};gameDur=90}
function updateTight(dt){
const t=tight;if(t.fallen)return;
t.maxROM=Math.max(t.maxROM,Math.abs(ankle)*30);
// Player ankle pushes lean toward center (ankle = correction force)
// The challenge: ankle input is your CORRECTION, not position
// lean > 0 = leaning right, < 0 = leaning left
const correction = ankle * 400 * dt; // ankle input applies force
t.lean -= correction;
// Wind and disturbances
t.windT-=dt;
if(t.windT<=0){t.wind=randF(-80,80)*(1+gameTime*.01);t.windT=randF(2,5)}
t.lean+=t.wind*dt;
// Random wobble increases over time
t.wobble=15+gameTime*.3;
t.lean+=Math.sin(gameTime*1.5)*t.wobble*dt;
// Gravity pull (slight toward edges — unstable equilibrium)
t.lean+=t.lean*.3*dt;
t.lean=clamp(t.lean,-100,100);t.maxLean=Math.max(t.maxLean,Math.abs(t.lean));
// Score for staying balanced
if(Math.abs(t.lean)<30)t.score+=Math.round((30-Math.abs(t.lean))*dt*2);
// Gems
if(Math.random()<dt*.8){const side=Math.random()>.5?1:-1;
t.gems.push({x:side*randF(30,70),life:3,got:false})}
t.gems.forEach(g=>{g.life-=dt;
if(!g.got&&Math.abs(t.lean-g.x)<20){g.got=true;t.gemsGot++;t.score+=50}});
t.gems=t.gems.filter(g=>g.life>0&&!g.got);
// Fall check
if(Math.abs(t.lean)>=100){t.fallen=true;
setTimeout(()=>endGame({pct:Math.round(gameTime/gameDur*100),title:'🎪 You Fell!',
items:[{val:t.score,label:'Score'},{val:t.gemsGot,label:'Gems'},{val:gameTime.toFixed(1)+'s',label:'Survived'},{val:t.maxROM.toFixed(0)+'°',label:'Max ROM'}]}),800)}
const bal=Math.round(100-Math.abs(t.lean));
hud(t.score,'Balance: '+bal+'%','💎'+t.gemsGot,gameDur-gameTime);
if(gameTime>=gameDur&&!t.fallen)endGame({pct:100,title:'🎪 Perfect Balance!',
items:[{val:t.score,label:'Score'},{val:t.gemsGot,label:'Gems'},{val:'90s',label:'Survived!'},{val:t.maxROM.toFixed(0)+'°',label:'Max ROM'}]})}
function drawTight(){
const t=tight;
const ropeY=H*.6;
// Rope
cx.strokeStyle='#8B7355';cx.lineWidth=4;
cx.beginPath();cx.moveTo(W*.1,ropeY);cx.lineTo(W*.9,ropeY);cx.stroke();
// Poles
cx.fillStyle='#654321';cx.fillRect(W*.1-4,ropeY-80,8,80+H*.3);cx.fillRect(W*.9-4,ropeY-80,8,80+H*.3);
// Character position on rope
const charX=W/2+t.lean*(W*.35/100);
// Lean visual
cx.save();cx.translate(charX,ropeY-25);cx.rotate(t.lean/100*.5);
cx.font='40px serif';cx.textAlign='center';cx.textBaseline='bottom';cx.fillText('🤸',0,0);
// Balance arms
cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=3;
cx.beginPath();cx.moveTo(-20,-15);cx.lineTo(-35,-15-t.lean*.15);cx.stroke();
cx.beginPath();cx.moveTo(20,-15);cx.lineTo(35,-15+t.lean*.15);cx.stroke();
cx.restore();
// Gems floating near rope
t.gems.forEach(g=>{const gx=W/2+g.x*(W*.35/100);
cx.globalAlpha=Math.min(1,g.life);cx.font='24px serif';cx.textAlign='center';
cx.fillText('💎',gx,ropeY-60-Math.sin(gameTime*3)*8);cx.globalAlpha=1});
// Balance meter bar at top
const mW=W*.5,mH=10,mX=(W-mW)/2,mY=20;
cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(mX,mY,mW,mH);
// Center zone (safe)
cx.fillStyle='rgba(107,203,119,.3)';cx.fillRect(mX+mW*.35,mY,mW*.3,mH);
// Lean indicator
const indX=mX+mW/2+t.lean/100*(mW/2);
cx.fillStyle=Math.abs(t.lean)<30?'#6bcb77':Math.abs(t.lean)<60?'#ffd93d':'#ff4444';
cx.beginPath();cx.arc(clamp(indX,mX+5,mX+mW-5),mY+mH/2,8,0,Math.PI*2);cx.fill();
// Wind indicator
if(Math.abs(t.wind)>20){cx.fillStyle='rgba(255,255,255,.3)';cx.font='600 12px Fredoka';cx.textAlign='center';
cx.fillText(t.wind>0?'💨 →':'← 💨',W/2,ropeY+30)}
// Danger flash at edges
if(Math.abs(t.lean)>70){const a=(Math.abs(t.lean)-70)/30*.3;
cx.fillStyle=`rgba(255,0,0,${a})`;cx.fillRect(0,0,W,H)}
// Fallen?
if(t.fallen){cx.font='44px serif';cx.textAlign='center';cx.textBaseline='middle';
cx.fillText('😵',charX,ropeY+80+gameTime*50)}}

// ═══ PREVENT ZOOM ═══
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(gameOn)e.preventDefault()},{passive:false});
if(!cx.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){r=Math.min(r,w/2,h/2);this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath()}}
</script>
